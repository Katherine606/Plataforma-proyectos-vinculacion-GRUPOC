<section class="login-page">
  <div class="login-card">
    <h1>Iniciar sesión</h1>
    <p>Plataforma de Vinculación</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <label for="email">Correo institucional</label>
      <input id="email" type="email" formControlName="email" placeholder="usuario@ug.edu.ec" />
      <small *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
        Ingresa un correo válido.
      </small>

      <label for="password">Contraseña</label>
      <input id="password" type="password" formControlName="password" placeholder="********" />
      <small *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
        La contraseña debe tener al menos 6 caracteres.
      </small>

      <button type="submit" [disabled]="cargando">
        {{ cargando ? 'Validando...' : 'Entrar' }}
      </button>
    </form>

    <div class="error" *ngIf="error">{{ error }}</div>

    <div class="demo-users">
      <strong>Usuarios demo:</strong>
      <span>coordinador@ug.edu.ec / Coord123*</span>
      <span>tutor@ug.edu.ec / Tutor123*</span>
      <span>estudiante@ug.edu.ec / Est12345*</span>
    </div>
  </div>
</section>
