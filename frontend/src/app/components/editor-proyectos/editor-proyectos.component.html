<div class="editor-header">
  <h1>Editor de proyectos</h1>

  <div class="filtros">
    <strong>Filtros</strong>
    <select [(ngModel)]="filtroCarrera">
      <option value="">Todas las carreras</option>
      <option *ngFor="let c of carrerasUnicas" [value]="c">{{ c }}</option>
    </select>
  </div>
</div>

<div *ngIf="errorMsg" style="color:#dc2626; background:#fee; padding:12px; border-radius:8px; margin-bottom:15px;">
  {{ errorMsg }}
</div>

<div class="proyectos-grid">

  <p *ngIf="proyectosFiltrados.length === 0" style="color:#888;">
    No hay proyectos registrados aún.
  </p>

  <div class="proyecto-card" *ngFor="let p of proyectosFiltrados">
    <div class="card-top">
      <strong>{{ p.nombre }}</strong>
      <button *ngIf="canManageProjects" class="btn-eliminar" title="Eliminar" (click)="confirmarEliminar(p)">
        🗑
      </button>
    </div>
    <button *ngIf="canManageProjects" class="btn btn-editar" (click)="abrirEditor(p)">Editar</button>
    <span *ngIf="!canManageProjects" class="tutor-info">Solo lectura</span>
    <p class="tutor-info">tutor asignado: {{ p.tutor }}</p>
  </div>

</div>

<!-- ===== MODAL DE EDICIÓN ===== -->
<div *ngIf="modalAbierto && proyectoEditando" class="modal-overlay">
  <div class="modal-box">

    <!-- X arriba a la izquierda: cierra el modal -->
    <button class="modal-cerrar-x" (click)="cerrarModal()">✕</button>

    <h2>{{ proyectoEditando.nombre }}</h2>

    <!-- Tarjetas de estadísticas -->
    <div class="modal-stats">
      <div class="stat-card">
        <span class="stat-icon">👤</span>
        <div>
          <small>Estudiantes actuales</small>
          <strong>{{ proyectoEditando.cupos_usados }}</strong>
        </div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">📋</span>
        <div>
          <small>Cupos Restantes</small>
          <strong>{{ cuposRestantes }}</strong>
        </div>
      </div>
    </div>

    <!-- Formulario de edición -->
    <div class="modal-form-grid">
      <div class="modal-left">
        <div class="form-group">
          <label for="editNombre">Nombre del proyecto</label>
          <input type="text" id="editNombre" [(ngModel)]="editNombre">
        </div>
        <div class="form-group">
          <label for="editDescripcion">Descripción</label>
          <textarea id="editDescripcion" [(ngModel)]="editDescripcion" rows="4"></textarea>
        </div>
      </div>

      <div class="modal-right">
        <div class="form-group">
          <label for="editTutor">Tutor</label>
          <select id="editTutor" [(ngModel)]="editTutorId" [disabled]="editTutorBloqueado">
            <option [ngValue]="null">-- Seleccionar --</option>
            <option *ngFor="let t of tutores" [ngValue]="t.id">{{ t.nombre }} {{ t.apellido }}</option>
          </select>
        </div>
        <button type="button" class="btn btn-warning" (click)="habilitarTutor()">
          Cambiar tutor
        </button>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn" (click)="guardarCambios()">Guardar</button>
      <button type="button" class="btn btn-secondary" (click)="revertirCambios()">Cancelar</button>
    </div>

  </div>
</div>
