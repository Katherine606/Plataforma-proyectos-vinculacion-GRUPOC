<h1>Mi Perfil</h1>

<p *ngIf="cargando" class="empty-state">Cargando perfil...</p>

<div *ngIf="error" class="alert-error">{{ error }}</div>

<div *ngIf="!cargando && usuario" class="perfil-container">

  <div class="perfil-info">
    <div class="perfil-avatar">{{ usuario.nombre?.charAt(0) }}{{ usuario.apellido?.charAt(0) }}</div>
    <div class="perfil-datos">
      <h2>{{ usuario.nombre }} {{ usuario.apellido }}</h2>
      <p class="perfil-email">{{ usuario.correo }}</p>
      <span class="badge badge-info">{{ rolDisplay }}</span>
    </div>
  </div>

  <div class="perfil-seccion">
    <h3>Cambiar contraseña</h3>

    <div *ngIf="exitoMsg" class="alert-success">{{ exitoMsg }}</div>
    <div *ngIf="errorMsgPwd" class="alert-error">{{ errorMsgPwd }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmitPassword()">
      <div class="form-group">
        <label>Contraseña actual</label>
        <input type="password" formControlName="password_actual" autocomplete="current-password">
      </div>

      <div class="form-group">
        <label>Nueva contraseña (mínimo 6 caracteres)</label>
        <input type="password" formControlName="password_nueva" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label>Confirmar nueva contraseña</label>
        <input type="password" formControlName="password_confirmar" autocomplete="new-password">
        <span class="error-msg" *ngIf="form.errors?.['passwordsNoCoinciden'] && form.get('password_confirmar')?.touched">
          Las contraseñas no coinciden.
        </span>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn" [disabled]="cambiando">
          {{ cambiando ? 'Guardando...' : 'Actualizar contraseña' }}
        </button>
      </div>
    </form>
  </div>

</div>
